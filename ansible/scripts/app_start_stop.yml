---
- name: Manage Tomcat service
  hosts: localhost
  become: yes
  vars:
    tomcat_bin: /opt/tomcat/apache-tomcat-8.5.97/bin

  tasks:

    - name: Start Tomcat
      when: action == "start"
      shell: "{{ tomcat_bin }}/startup.sh"
      environment:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        PATH: "{{ ansible_env.PATH }}:/usr/lib/jvm/java-17-openjdk-amd64/bin"
      register: start_out
      changed_when: start_out.rc == 0

    - name: Show start output
      when: action == "start"
      debug:
        var: start_out.stdout_lines

    - name: Stop Tomcat
      when: action == "stop"
      shell: "{{ tomcat_bin }}/shutdown.sh"
      environment:
         JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
         PATH: "{{ ansible_env.PATH }}:/usr/lib/jvm/java-17-openjdk-amd64/bin"
      register: stop_out
      changed_when: stop_out.rc == 0

    - name: Show stop output
      when: action == "stop"
      debug:
        var: stop_out.stdout_lines

    - name: Check Tomcat status (ps output)
      when: action == "status"
      shell: "ps -ef | grep [t]omcat || true"
      register: status_out
      changed_when: false

    - name: Display status
      when: action == "status"
      debug:
        msg: |
          {% if status_out.stdout %}
          Tomcat process(es) running:
          {{ status_out.stdout }}
          {% else %}
          No Tomcat process found.
          {% endif %}
